<style>
/* ---------- RESET ---------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* ---------- ENVIRONMENTAL BACKGROUND ---------- */
body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(180,255,220,0.4), transparent 40%),
        radial-gradient(circle at bottom right, rgba(180,220,255,0.4), transparent 40%),
        linear-gradient(135deg, #c9f7e7, #e9f7ff);
    color: #1a1a1a;
}

/* ---------- NAVBAR ---------- */
nav {
    width: 100%;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;

    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.6);
}

/* ---------- LOGO SPACE ---------- */
.logo-box {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-box img {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    object-fit: contain;
    background: rgba(255,255,255,0.6);
    padding: 6px;
}

/* Text logo (optional backup) */
.logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #2f6f5e;
}

/* ---------- NAV LINKS ---------- */
.nav-links a {
    text-decoration: none;
    margin-left: 26px;;
    font-size: 15px;
    color: #2c2c2c;
    position: relative;
    transition: 0.3s ease;
    position: relative;
    font-size: large;
}

/* underline animation */
.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #3fbf9c, #4facfe);
    transition: 0.3s ease;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a:hover {
    color: #3fbf9c;
}

/* ---------- HERO SECTION ---------- */
.hero {
    height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* ---------- GLASS CARD ---------- */
.hero-card {
    max-width: 620px;
    padding: 50px;
    border-radius: 22px;

    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.7);

    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    text-align: center;

    animation: floatIn 1.2s ease;
}

.hero-card h1 {
    font-size: 38px;
    margin-bottom: 14px;
    color: #1f3f3a;
}

.hero-card h1 span {
    color: #3fbf9c;
}

.hero-card p {
    font-size: 16px;
    color: #333;
    opacity: 0.9;
    margin-bottom: 32px;
}

/* ---------- BUTTON ---------- */
.btn {
    padding: 12px 34px;
    border-radius: 30px;
    background: linear-gradient(90deg, #3fbf9c, #4facfe);
    color: white;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    transition: 0.35s ease;
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 35px rgba(79, 172, 254, 0.5);
}

/* ---------- ANIMATION ---------- */
@keyframes floatIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 650px) {
    nav {
        flex-direction: column;
        gap: 14px;
    }

    .hero-card {
        padding: 35px;
    }

    .hero-card h1 {
        font-size: 30px;
    }
}

</style>
